<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="systemGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="systemGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#0f172a"/>
  
  <!-- Grid of Components -->
  <!-- Row 1: Buttons -->
  <rect x="60" y="40" width="120" height="45" fill="#06b6d4" rx="6"/>
  <text x="120" y="68" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Primary</text>
  
  <rect x="200" y="40" width="120" height="45" fill="none" stroke="#0284c7" stroke-width="2" rx="6"/>
  <text x="260" y="68" font-family="Arial, sans-serif" font-size="12" fill="#0284c7" text-anchor="middle" font-weight="bold">Secondary</text>
  
  <rect x="340" y="40" width="120" height="45" fill="#0369a1" rx="6" opacity="0.7"/>
  <text x="400" y="68" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Tertiary</text>
  
  <!-- Row 2: Cards -->
  <rect x="60" y="110" width="100" height="80" fill="url(#systemGrad1)" opacity="0.2" stroke="#06b6d4" stroke-width="2" rx="8"/>
  <rect x="65" y="115" width="90" height="30" fill="#06b6d4" opacity="0.4" rx="4"/>
  <line x1="65" y1="155" x2="155" y2="155" stroke="#0284c7" stroke-width="1" opacity="0.6"/>
  <line x1="65" y1="165" x2="155" y2="165" stroke="#0284c7" stroke-width="1" opacity="0.4"/>
  
  <rect x="180" y="110" width="100" height="80" fill="url(#systemGrad2)" opacity="0.15" stroke="#0284c7" stroke-width="2" rx="8"/>
  <circle cx="230" cy="135" r="12" fill="#06b6d4" opacity="0.6"/>
  <line x1="185" y1="160" x2="275" y2="160" stroke="#0284c7" stroke-width="1" opacity="0.5"/>
  <line x1="185" y1="172" x2="275" y2="172" stroke="#0284c7" stroke-width="1" opacity="0.3"/>
  
  <rect x="300" y="110" width="100" height="80" fill="#0369a1" opacity="0.1" stroke="#06b6d4" stroke-width="2" rx="8"/>
  <rect x="310" y="120" width="30" height="30" fill="#06b6d4" opacity="0.5" rx="4"/>
  <rect x="350" y="120" width="30" height="30" fill="#0284c7" opacity="0.5" rx="4"/>
  <rect x="310" y="160" width="70" height="15" fill="#06b6d4" opacity="0.3" rx="3"/>
  
  <!-- Row 3: Colors & Typography -->
  <circle cx="105" cy="230" r="20" fill="#06b6d4"/>
  <text x="105" y="265" font-family="Arial, sans-serif" font-size="10" fill="#06b6d4" text-anchor="middle" font-weight="bold">Cyan</text>
  
  <circle cx="225" cy="230" r="20" fill="#0284c7"/>
  <text x="225" y="265" font-family="Arial, sans-serif" font-size="10" fill="#0284c7" text-anchor="middle" font-weight="bold">Blue</text>
  
  <circle cx="345" cy="230" r="20" fill="#0369a1"/>
  <text x="345" y="265" font-family="Arial, sans-serif" font-size="10" fill="#0369a1" text-anchor="middle" font-weight="bold">Dark</text>
  
  <!-- Row 4: Icons & Spacing -->
  <rect x="60" y="290" width="25" height="25" fill="#06b6d4" opacity="0.4" rx="4"/>
  <text x="72.5" y="308" font-family="Arial, sans-serif" font-size="14" fill="#06b6d4" text-anchor="middle" font-weight="bold">◆</text>
  
  <rect x="100" y="290" width="25" height="25" fill="none" stroke="#06b6d4" stroke-width="1.5" rx="4"/>
  <text x="112.5" y="308" font-family="Arial, sans-serif" font-size="12" fill="#06b6d4" text-anchor="middle">+</text>
  
  <rect x="140" y="290" width="25" height="25" fill="#0284c7" opacity="0.3" rx="12"/>
  <text x="152.5" y="308" font-family="Arial, sans-serif" font-size="12" fill="#0284c7" text-anchor="middle" font-weight="bold">✓</text>
  
  <text x="230" y="310" font-family="Arial, sans-serif" font-size="11" fill="#0284c7" font-weight="bold">8px</text>
  <text x="230" y="325" font-family="Arial, sans-serif" font-size="11" fill="#0284c7" font-weight="bold">16px</text>
  <text x="230" y="340" font-family="Arial, sans-serif" font-size="11" fill="#0284c7" font-weight="bold">24px</text>
  
  <!-- Hover indicator -->
  <rect x="380" y="290" width="70" height="50" fill="url(#systemGrad1)" opacity="0.15" stroke="#06b6d4" stroke-width="1.5" rx="6" stroke-dasharray="4,2"/>
  <text x="415" y="315" font-family="Arial, sans-serif" font-size="9" fill="#06b6d4" text-anchor="middle" font-weight="bold">States</text>
  <text x="415" y="330" font-family="Arial, sans-serif" font-size="8" fill="#0284c7" text-anchor="middle">Hover • Focus • Active</text>
  
  <!-- Title -->
  <text x="300" y="375" font-family="Arial, sans-serif" font-size="22" fill="#06b6d4" text-anchor="middle" font-weight="bold">UI/UX Design System</text>
  <text x="300" y="398" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">Components • Patterns • Guidelines</text>
</svg>