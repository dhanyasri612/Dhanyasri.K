<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mobileScreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#0f172a"/>
  
  <!-- Left Phone -->
  <rect x="80" y="60" width="160" height="280" fill="#1e293b" rx="18" stroke="#a855f7" stroke-width="3"/>
  <rect x="88" y="75" width="144" height="250" fill="#0f172a" rx="12"/>
  
  <!-- Phone 1 Status Bar -->
  <rect x="88" y="75" width="144" height="25" fill="url(#headerGrad)" rx="12" rx-top="12"/>
  <text x="100" y="92" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">9:41</text>
  <circle cx="218" cy="85" r="3" fill="#a855f7"/>
  <circle cx="224" cy="85" r="3" fill="#a855f7"/>
  <circle cx="230" cy="85" r="3" fill="#a855f7"/>
  
  <!-- Phone 1 Content -->
  <rect x="95" y="110" width="130" height="35" fill="#a855f7" opacity="0.3" rx="8"/>
  <text x="160" y="135" font-family="Arial, sans-serif" font-size="11" fill="#a855f7" text-anchor="middle" font-weight="bold">Welcome</text>
  
  <rect x="95" y="155" width="130" height="25" fill="#a855f7" opacity="0.2" rx="6"/>
  <rect x="95" y="190" width="130" height="25" fill="#7c3aed" opacity="0.2" rx="6"/>
  <rect x="95" y="225" width="130" height="25" fill="#a855f7" opacity="0.15" rx="6"/>
  
  <rect x="95" y="265" width="60" height="25" fill="#a855f7" rx="6"/>
  <text x="125" y="281" font-family="Arial, sans-serif" font-size="9" fill="#fff" text-anchor="middle">Explore</text>
  
  <!-- Center Phone -->
  <rect x="280" y="50" width="160" height="280" fill="#1e293b" rx="18" stroke="#7c3aed" stroke-width="3"/>
  <rect x="288" y="65" width="144" height="250" fill="#0f172a" rx="12"/>
  
  <!-- Phone 2 Status Bar -->
  <rect x="288" y="65" width="144" height="25" fill="url(#headerGrad)" rx="12" rx-top="12"/>
  <text x="300" y="82" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">9:41</text>
  <circle cx="418" cy="75" r="3" fill="#a855f7"/>
  <circle cx="424" cy="75" r="3" fill="#a855f7"/>
  <circle cx="430" cy="75" r="3" fill="#a855f7"/>
  
  <!-- Phone 2 Content - Profile -->
  <circle cx="360" cy="110" r="20" fill="#7c3aed" opacity="0.5"/>
  <text x="360" y="115" font-family="Arial, sans-serif" font-size="20" fill="#a855f7" text-anchor="middle" font-weight="bold">👤</text>
  
  <rect x="300" y="140" width="120" height="15" fill="#a855f7" opacity="0.25" rx="3"/>
  <rect x="300" y="160" width="120" height="12" fill="#7c3aed" opacity="0.15" rx="2"/>
  <rect x="300" y="178" width="120" height="12" fill="#7c3aed" opacity="0.15" rx="2"/>
  
  <rect x="298" y="210" width="55" height="22" fill="#a855f7" rx="5"/>
  <text x="325" y="224" font-family="Arial, sans-serif" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">Edit</text>
  
  <!-- Right Phone -->
  <rect x="480" y="60" width="160" height="280" fill="#1e293b" rx="18" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
  <rect x="488" y="75" width="144" height="250" fill="#0f172a" rx="12" opacity="0.7"/>
  
  <!-- Phone 3 Status Bar -->
  <rect x="488" y="75" width="144" height="25" fill="url(#headerGrad)" rx="12" rx-top="12" opacity="0.7"/>
  
  <!-- Bottom Text -->
  <text x="300" y="360" font-family="Arial, sans-serif" font-size="22" fill="#a855f7" text-anchor="middle" font-weight="bold">Mobile App UI/UX</text>
  <text x="300" y="385" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">Interactive • Responsive • User-Focused</text>
</svg>